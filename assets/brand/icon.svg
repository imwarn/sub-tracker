<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Sub-Tracker icon</title>
  <desc id="desc">A rounded dark app icon with a tracked subscription card, reminder ring, and balance marker.</desc>
  <defs>
    <linearGradient id="bg" x1="86" y1="40" x2="438" y2="470" gradientUnits="userSpaceOnUse">
      <stop stop-color="#082f49"/>
      <stop offset="0.48" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="card" x1="154" y1="116" x2="368" y2="386" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="accent" x1="128" y1="111" x2="367" y2="347" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="coin" x1="319" y1="298" x2="425" y2="413" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fde68a"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="shadow" x="82" y="66" width="360" height="392" color-interpolation-filters="sRGB" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="22" stdDeviation="22" flood-color="#020617" flood-opacity="0.32"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <path d="M86 376c74-6 115-42 148-94 51-80 95-136 191-147" fill="none" stroke="#67e8f9" stroke-width="24" stroke-linecap="round" opacity="0.18"/>
  <path d="M112 138c54-45 121-62 199-51 57 8 96 31 124 61" fill="none" stroke="#bae6fd" stroke-width="12" stroke-linecap="round" opacity="0.22"/>

  <g filter="url(#shadow)">
    <rect x="130" y="101" width="252" height="310" rx="54" fill="url(#accent)"/>
    <rect x="158" y="129" width="196" height="254" rx="34" fill="url(#card)"/>
    <path d="M202 129h108v38c0 13-11 24-24 24h-60c-13 0-24-11-24-24v-38Z" fill="#0ea5e9"/>
    <path d="M214 244h84M214 292h54" stroke="#0f172a" stroke-width="24" stroke-linecap="round"/>
    <path d="M214 332h46" stroke="#0284c7" stroke-width="18" stroke-linecap="round" opacity="0.7"/>
    <path d="M202 202h32M278 202h32" stroke="#38bdf8" stroke-width="20" stroke-linecap="round"/>
  </g>

  <circle cx="363" cy="356" r="62" fill="url(#coin)"/>
  <path d="M363 322v68M333 345h60M333 367h60" stroke="#78350f" stroke-width="16" stroke-linecap="round"/>
  <path d="M382 169c24 19 39 48 39 81 0 19-5 37-14 52" fill="none" stroke="#f8fafc" stroke-width="18" stroke-linecap="round" opacity="0.88"/>
  <circle cx="394" cy="149" r="22" fill="#22c55e"/>
  <path d="M385 149l7 7 16-18" fill="none" stroke="#052e16" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
