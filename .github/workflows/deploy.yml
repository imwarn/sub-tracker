name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # 将 GitHub Secret 中的 KV ID 写入 wrangler.toml
      - name: Inject KV Namespace ID
        if: ${{ secrets.KV_NAMESPACE_ID != '' }}
        run: |
          sed -i "s/YOUR_KV_NAMESPACE_ID/${{ secrets.KV_NAMESPACE_ID }}/g" wrangler.toml
          echo "✅ KV Namespace ID injected"

      # 将 TG 密钥设置为 Worker 环境变量 (Secrets)
      - name: Set Worker Secrets
        if: ${{ secrets.TG_BOT_TOKEN != '' }}
        run: |
          echo "${{ secrets.TG_BOT_TOKEN }}" | npx wrangler secret put TG_BOT_TOKEN --force || true
          echo "${{ secrets.TG_CHAT_ID }}" | npx wrangler secret put TG_CHAT_ID --force || true
          echo "✅ TG secrets set"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
