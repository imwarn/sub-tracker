name = "sub-tracker"
main = "src/index.js"
compatibility_date = "2024-12-01"

# KV 命名空间 - Deploy 按钮会自动创建
[[kv_namespaces]]
binding = "DB"

# 环境变量 - 声明后 Dashboard 设置的值不会被部署覆盖清除
# 在 Cloudflare Dashboard → Workers → Settings → Variables 中填写真实值
[vars]
TG_BOT_TOKEN = ""
TG_CHAT_ID = ""

# 定时任务 - 每天 UTC 01:00 (北京时间 09:00) 检查到期提醒
[triggers]
crons = ["0 1 * * *"]
