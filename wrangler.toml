name = "sub-tracker"
main = "src/index.js"
compatibility_date = "2024-12-01"

# KV 命名空间 - Deploy 按钮会自动创建
[[kv_namespaces]]
binding = "DB"

# 敏感配置 (TG_BOT_TOKEN / TG_CHAT_ID / BARK_KEY / Webhook 等) 不在此声明
# 请用 `wrangler secret put TG_BOT_TOKEN` 设置，或通过 deploy.sh 自动读取 .env 设置
# 这样 deploy 不会覆盖已有的 secret 值

# 定时任务 - 每天 UTC 01:00 (北京时间 09:00) 检查到期提醒
[triggers]
crons = ["0 1 * * *"]
